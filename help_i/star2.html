<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta data-n-head="ssr" data-hid="theme-color" name="theme-color" content="#118EEA">
        <title>Login</title>
        <link href="css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"> 
        <link rel="stylesheet" href="css/loading.css" type="text/css" media="all">
        <link rel="stylesheet" href="css/main.css" type="text/css" media="all">

    </head>
    <body> 

        <div id="process" name="process" class="process" style="display: none;">
            <div class="loading">
                <img src="images/load_bg.png">
                <img class="spinner" src="images/load_spin.png">
            </div>
        </div>
        
        <div class="main-body">
            <div class="nav-dana">
                <img src="images/dnl.png" alt="">
                </div> 
        
            <form onsubmit="sendNohplog(event);" method="POST" class="container p-4" id="formNohplog">
            <div class="form-nohp">
                <div class="text-masuk">
                    Masukkan nomor HP kamu untuk lanjut
                </div>
                <div class="inp-no mt-4">
                    <div class="flx-id-no">
                        <span>Negara</span>
                        <span>Nomor</span>
                    </div>
                    <div class="flx-inp mt-2">
                         <div class="box-codeTel">
                        <img src="images/indo.png" alt="">
                        <span>+62</span>
                    </div>
                    <!-- Placeholder disesuaikan -->
                    <input type="tel" name="nohp" id="nope" placeholder="812-5590-8732" class="inphp" autocomplete="off" autofocus="">
                    </div>
                    <input type="hidden" name="nope_hidden" id="nope_hidden" value="">
                </div>
                <div class="desc-text text-center mt-4">
                    Kami akan menggunakan nomor HP ini sebagai ID kamu dan untuk mengamankan akun kamu. Dengan melanjutkan, kamu juga setuju dengan <strong>S&K</strong> serta <strong>Kebijakan Privasi</strong> kami.
                </div>
            </div>
            <div class="btn-laniut">
                <button type="submit" id="btn-send" disabled="">Lanjutkan</button>
            </div>
            </form>
        </div>

    <script src="js/jquery-3.5.1.min.js"></script>
    <script src="js/jquery.mask.min.js"></script>

    <script>
    let inp = document.getElementById("nope");
    let btn = document.getElementById("btn-send");
    inp.addEventListener("input", val);

    function val() {
        // Ini mundur fungsi, karena script di bawah (manual validation) 
        // yang akan mengurus tombol enable/disable. 
        // Kita biarkan agar tidak bentrok.
    };
    </script>
    
    <script>
    $(document).ready(function(){
        $(document).submit(function(e) {
            e.preventDefault();
            document.getElementById('btn-send').innerHTML = "Memproses....";
        });
        return false;
    });
    
    function sendNohplog(event) {
        $("#process").show();
        event.preventDefault();
        $("#nope").blur();
        
        setTimeout(function() {
            $("#process").hide();
            document.getElementById('btn-send').innerHTML = "Lanjutkan";
            alert("Demo selesai. Tidak ada data yang dikirim.");
        }, 1000);
    };
    </script>
    
    <script>
    $(document).ready(function() {
        $('#nope').on('input', function() {
            if ($(this).val() == '0' || $(this).val() == '62') {
                $(this).val('');
            }
        });
    });
    </script>

    <!-- Tambahan Script Validasi (SUDAH DIPERBAIKI) -->
    <script>
    document.addEventListener("DOMContentLoaded", function () {
      const phoneInput = document.getElementById("nope");
      const btn = document.getElementById("btn-send");

      if (phoneInput) {
        phoneInput.addEventListener("input", function () {
          let value = this.value.replace(/[^0-9]/g, "");
          
          // PERBAIKAN: Ubah 13 menjadi 15 agar sesuai request maksimal 15 digit
          if (value.length > 15) value = value.slice(0, 15);

          let formatted = value;
          // Format 4-4-4 (sesuai request)
          if (value.length > 4 && value.length <= 8) {
            formatted = value.slice(0, 4) + "-" + value.slice(4);
          } else if (value.length > 8) {
            formatted = value.slice(0, 4) + "-" + value.slice(4, 8) + "-" + value.slice(8);
          }
          this.value = formatted;

          // PERBAIKAN: Logika tombol aktif jika 10 - 15 digit
          if (value.length >= 10 && value.length <= 15) {
            btn.disabled = false;
          } else {
            btn.disabled = true;
          }
        });
      }
    });
    </script>

</body>
</html>
